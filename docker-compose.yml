services:
  db:
    image: postgres:16-alpine
    container_name: mto-erp-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: mto_erp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - mto_erp_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mto_erp"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio:
    image: minio/minio:RELEASE.2026-03-13T11-33-47Z
    container_name: mto-erp-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - mto_erp_minio_data:/data

  minio-init:
    image: minio/mc:RELEASE.2026-03-12T17-29-24Z
    container_name: mto-erp-minio-init
    depends_on:
      - minio
    restart: "no"
    entrypoint: ["/bin/sh", "-ec"]
    command:
      - until /usr/bin/mc alias set local http://minio:9000 minioadmin minioadmin; do sleep 1; done; /usr/bin/mc mb --ignore-existing local/mto-erp

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: mto-erp-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@db:5432/mto_erp?schema=public
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: mto-erp
    ports:
      - "3000:3000"

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    container_name: mto-erp-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  mto_erp_pgdata:
  mto_erp_minio_data:
